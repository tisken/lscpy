<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Source Checker</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #3b82f6; --red: #ef4444; --green: #22c55e; --yellow: #eab308; --text: #e2e8f0; --muted: #94a3b8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .header h1 { font-size: 1.3rem; }
  .header h1 span { color: var(--accent); }
  .controls { display: flex; gap: .5rem; margin-left: auto; align-items: center; flex-wrap: wrap; }
  .controls label { font-size: .85rem; color: var(--muted); }
  .controls input, .controls select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .4rem .6rem; border-radius: 6px; font-size: .85rem; }
  button { background: var(--accent); color: #fff; border: none; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-size: .85rem; transition: opacity .2s; }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.secondary { background: var(--border); }
  button.danger { background: var(--red); }
  .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

  /* Filtros */
  .filter-bar { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; overflow: hidden; }
  .filter-toggle { display: flex; align-items: center; justify-content: space-between; padding: .6rem 1rem; cursor: pointer; user-select: none; }
  .filter-toggle:hover { background: rgba(59,130,246,.08); }
  .filter-toggle h3 { font-size: .9rem; font-weight: 600; color: var(--muted); }
  .filter-toggle .arrow { transition: transform .2s; font-size: .75rem; color: var(--muted); }
  .filter-toggle .arrow.open { transform: rotate(180deg); }
  .filter-body { display: none; padding: .8rem 1rem; border-top: 1px solid var(--border); }
  .filter-body.open { display: block; }
  .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: .6rem; }
  .filter-field label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .25rem; }
  .filter-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .4rem .6rem; border-radius: 6px; font-size: .85rem; }
  .filter-actions { display: flex; gap: .5rem; margin-top: .6rem; align-items: center; }
  .filter-actions .result-count { font-size: .8rem; color: var(--muted); margin-left: auto; }

  /* Filtro local rápido */
  .local-filter { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; }
  .local-filter input { flex: 1; max-width: 400px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .4rem .6rem; border-radius: 6px; font-size: .85rem; }
  .local-filter span { font-size: .8rem; color: var(--muted); }

  .error-table { width: 100%; border-collapse: collapse; }
  .error-table th, .error-table td { padding: .6rem .8rem; text-align: left; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .error-table th { color: var(--muted); font-weight: 600; position: sticky; top: 0; background: var(--bg); }
  .error-table tr:hover { background: var(--card); }
  .error-table tr.hidden-row { display: none; }
  .count-badge { background: var(--red); color: #fff; padding: .15rem .5rem; border-radius: 99px; font-size: .75rem; font-weight: 700; }
  .analysis-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-top: 1.5rem; padding: 1.5rem; display: none; }
  .analysis-panel.visible { display: block; }
  .analysis-panel h3 { margin-bottom: 1rem; font-size: 1rem; }
  .snippet-box { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 1rem; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: .8rem; line-height: 1.6; white-space: pre; margin: .8rem 0; }
  .snippet-box .highlight { color: var(--red); font-weight: 700; }
  .llm-result { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-top: .8rem; white-space: pre-wrap; font-size: .85rem; line-height: 1.6; }
  .frames-list { display: flex; flex-wrap: wrap; gap: .4rem; margin: .5rem 0; }
  .frame-tag { background: var(--bg); border: 1px solid var(--border); padding: .2rem .5rem; border-radius: 4px; font-size: .75rem; font-family: monospace; }
  .frame-tag a { color: var(--accent); text-decoration: none; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--green); color: #000; padding: .8rem 1.2rem; border-radius: 8px; font-size: .85rem; display: none; z-index: 999; }
  .toast.error { background: var(--red); color: #fff; }
  .jira-bar { display: flex; gap: .5rem; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .jira-bar input { flex: 1; }
  .bulk-bar { display: flex; gap: .5rem; align-items: center; margin-top: 1rem; }
  .status-msg { font-size: .8rem; color: var(--muted); margin-left: .5rem; }
  .checkbox-col { width: 30px; text-align: center; }
  input[type="checkbox"] { accent-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>🔍 Log <span>Source</span> Checker</h1>
  <div class="controls">
    <label>Horas:</label>
    <input type="number" id="hours" value="24" min="1" max="168" style="width:60px">
    <label>Top:</label>
    <input type="number" id="size" value="50" min="1" max="200" style="width:60px">
    <button onclick="loadErrors()">Buscar errores</button>
    <button class="secondary" onclick="analyzeSelected()">Analizar seleccionados</button>
  </div>
</div>

<div class="container">

  <!-- Panel de filtros ES -->
  <div class="filter-bar">
    <div class="filter-toggle" onclick="toggleFilters()">
      <h3>🔎 Filtros de búsqueda</h3>
      <span class="arrow" id="filterArrow">▼</span>
    </div>
    <div class="filter-body" id="filterBody">
      <div class="filter-grid">
        <div class="filter-field">
          <label>Mensaje (cliente, producto, texto...)</label>
          <input type="text" id="filterMessage" placeholder='ej: "PaymentService" o "timeout"'>
        </div>
        <div class="filter-field">
          <label>Logger (clase Java)</label>
          <input type="text" id="filterLogger" placeholder="ej: com.app.billing">
        </div>
        <div class="filter-field">
          <label>Excepción</label>
          <input type="text" id="filterException" placeholder="ej: NullPointerException">
        </div>
      </div>
      <div class="filter-actions">
        <button onclick="loadErrors()">Aplicar filtros</button>
        <button class="secondary" onclick="clearFilters()">Limpiar</button>
        <span class="result-count" id="resultCount"></span>
      </div>
    </div>
  </div>

  <!-- Filtro local rápido sobre resultados ya cargados -->
  <div class="local-filter" id="localFilter" style="display:none">
    <input type="text" id="localSearch" placeholder="Filtrar en resultados cargados..." oninput="applyLocalFilter()">
    <span id="localCount"></span>
  </div>

  <table class="error-table">
    <thead>
      <tr>
        <th class="checkbox-col"><input type="checkbox" id="selectAll" onchange="toggleAll(this)"></th>
        <th>Count</th>
        <th>Exception</th>
        <th>Logger</th>
        <th>Mensaje</th>
        <th>Último</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="errorBody"></tbody>
  </table>

  <div class="bulk-bar" id="bulkBar" style="display:none">
    <span id="selectedCount">0 seleccionados</span>
    <button onclick="analyzeSelected()">🤖 Analizar seleccionados</button>
    <button class="secondary" onclick="sendSelectedToJira()">📧 Enviar a Jira</button>
    <span class="status-msg" id="bulkStatus"></span>
  </div>

  <div class="analysis-panel" id="analysisPanel">
    <h3 id="analysisTitle">Análisis</h3>
    <div id="framesContainer"></div>
    <div id="snippetContainer"></div>
    <div class="llm-result" id="llmResult"></div>
    <div class="jira-bar">
      <input type="text" id="jiraSubject" placeholder="Asunto del ticket Jira...">
      <button onclick="sendCurrentToJira()">📧 Enviar a Jira</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let errorData = [];
let analysisCache = {};

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

/* --- Filtros --- */
function toggleFilters() {
  const body = document.getElementById('filterBody');
  const arrow = document.getElementById('filterArrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

function clearFilters() {
  document.getElementById('filterMessage').value = '';
  document.getElementById('filterLogger').value = '';
  document.getElementById('filterException').value = '';
}

function getFilterParams() {
  const params = new URLSearchParams();
  params.set('hours', document.getElementById('hours').value);
  params.set('size', document.getElementById('size').value);
  const msg = document.getElementById('filterMessage').value.trim();
  const log = document.getElementById('filterLogger').value.trim();
  const exc = document.getElementById('filterException').value.trim();
  if (msg) params.set('message', msg);
  if (log) params.set('logger', log);
  if (exc) params.set('exception', exc);
  return params.toString();
}

function applyLocalFilter() {
  const term = document.getElementById('localSearch').value.toLowerCase();
  const rows = document.querySelectorAll('#errorBody tr');
  let visible = 0;
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    const match = !term || text.includes(term);
    row.classList.toggle('hidden-row', !match);
    if (match) visible++;
  });
  document.getElementById('localCount').textContent = `${visible} / ${errorData.length} visibles`;
}

/* --- Carga de errores --- */
async function loadErrors() {
  const body = document.getElementById('errorBody');
  body.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem"><div class="spinner"></div> Consultando Elasticsearch...</td></tr>';
  try {
    const resp = await fetch(`${API}/api/errors?${getFilterParams()}`);
    errorData = await resp.json();
    renderErrors();
    document.getElementById('resultCount').textContent = `${errorData.length} grupos de errores encontrados`;
  } catch (e) {
    body.innerHTML = `<tr><td colspan="7" style="color:var(--red)">Error: ${e.message}</td></tr>`;
  }
}

function renderErrors() {
  const body = document.getElementById('errorBody');
  if (!errorData.length) {
    body.innerHTML = '<tr><td colspan="7" style="color:var(--muted);padding:2rem;text-align:center">No se encontraron errores con los filtros seleccionados</td></tr>';
    document.getElementById('localFilter').style.display = 'none';
    return;
  }
  body.innerHTML = errorData.map((e, i) => `<tr>
    <td class="checkbox-col"><input type="checkbox" class="row-check" data-idx="${i}" onchange="updateSelected()"></td>
    <td><span class="count-badge">${e.count.toLocaleString()}</span></td>
    <td style="font-family:monospace;font-size:.8rem">${esc(e.exception_class)}</td>
    <td style="font-size:.8rem">${esc(e.logger)}</td>
    <td style="max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.message)}">${esc(e.message?.substring(0, 120))}</td>
    <td style="font-size:.8rem;color:var(--muted)">${new Date(e.timestamp).toLocaleString()}</td>
    <td><button onclick="analyzeSingle(${i})">🔍 Analizar</button></td>
  </tr>`).join('');
  document.getElementById('bulkBar').style.display = 'flex';
  document.getElementById('localFilter').style.display = 'flex';
  document.getElementById('localSearch').value = '';
  document.getElementById('localCount').textContent = `${errorData.length} / ${errorData.length} visibles`;
  updateSelected();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toggleAll(cb) {
  document.querySelectorAll('.row-check').forEach(c => { if (!c.closest('tr').classList.contains('hidden-row')) c.checked = cb.checked; });
  updateSelected();
}

function updateSelected() {
  const count = document.querySelectorAll('.row-check:checked').length;
  document.getElementById('selectedCount').textContent = `${count} seleccionados`;
}

function getSelectedIndices() {
  return [...document.querySelectorAll('.row-check:checked')].map(c => parseInt(c.dataset.idx));
}

async function analyzeSingle(idx) {
  const panel = document.getElementById('analysisPanel');
  const error = errorData[idx];
  panel.classList.add('visible');
  document.getElementById('analysisTitle').innerHTML = `<div class="spinner"></div> Analizando: ${esc(error.exception_class)}`;
  document.getElementById('framesContainer').innerHTML = '';
  document.getElementById('snippetContainer').innerHTML = '';
  document.getElementById('llmResult').textContent = '';
  document.getElementById('jiraSubject').value = `[ERROR] ${error.exception_class} in ${error.logger} (${error.count}x)`;

  try {
    const resp = await fetch(`${API}/api/analyze`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({error})
    });
    const data = await resp.json();
    analysisCache[idx] = data;
    renderAnalysis(data, error);
  } catch (e) {
    document.getElementById('llmResult').textContent = 'Error: ' + e.message;
  }
}

function renderAnalysis(data, error) {
  document.getElementById('analysisTitle').textContent = `Análisis: ${error.exception_class}`;

  if (data.frames?.length) {
    document.getElementById('framesContainer').innerHTML = '<div class="frames-list">' +
      data.frames.map(f => {
        const link = data.snippet?.bb_url && f.line === data.snippet.line
          ? `<a href="${data.snippet.bb_url}" target="_blank">${f.class}.${f.method}:${f.line}</a>`
          : `${f.class}.${f.method}:${f.line}`;
        return `<span class="frame-tag">${link}</span>`;
      }).join('') + '</div>';
  }

  if (data.snippet) {
    const highlighted = data.snippet.snippet.replace(/^(>>>.*$)/gm, '<span class="highlight">$1</span>');
    document.getElementById('snippetContainer').innerHTML =
      `<div class="snippet-box">${highlighted}</div>
       <a href="${data.snippet.bb_url}" target="_blank" style="color:var(--accent);font-size:.8rem">Abrir en Bitbucket →</a>`;
  } else {
    document.getElementById('snippetContainer').innerHTML = '<p style="color:var(--muted);font-size:.85rem">No se pudo obtener el código fuente de Bitbucket</p>';
  }

  document.getElementById('llmResult').innerHTML = formatMarkdown(data.llm_result?.analysis || 'Sin resultado');
}

function formatMarkdown(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:.1rem .3rem;border-radius:3px">$1</code>')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre style="background:#0d1117;padding:.8rem;border-radius:4px;margin:.5rem 0;overflow-x:auto">$2</pre>');
}

async function analyzeSelected() {
  const indices = getSelectedIndices();
  if (!indices.length) { toast('Selecciona al menos un error', true); return; }
  const status = document.getElementById('bulkStatus');
  for (let i = 0; i < indices.length; i++) {
    status.innerHTML = `<div class="spinner"></div> Analizando ${i + 1}/${indices.length}...`;
    await analyzeSingle(indices[i]);
  }
  status.textContent = `✅ ${indices.length} errores analizados`;
}

async function sendCurrentToJira() {
  const subject = document.getElementById('jiraSubject').value;
  if (!subject) { toast('Escribe un asunto', true); return; }
  const cached = Object.values(analysisCache);
  if (!cached.length) { toast('Analiza un error primero', true); return; }
  await doSendJira(subject, [cached[cached.length - 1]]);
}

async function sendSelectedToJira() {
  const indices = getSelectedIndices();
  const analyses = indices.map(i => analysisCache[i]).filter(Boolean);
  if (!analyses.length) { toast('Analiza los errores seleccionados primero', true); return; }
  await doSendJira(`Error Report - ${analyses.length} issues`, analyses);
}

async function doSendJira(subject, analyses) {
  try {
    const resp = await fetch(`${API}/api/send-jira`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({subject, analyses})
    });
    if (!resp.ok) throw new Error((await resp.json()).detail);
    toast('📧 Email enviado a Jira');
  } catch (e) {
    toast('Error enviando: ' + e.message, true);
  }
}
</script>
</body>
</html>
