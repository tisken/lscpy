<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSC - Login</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --accent: #3b82f6; --red: #ef4444; --text: #e2e8f0; --muted: #94a3b8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; width: 380px; }
  .login-box h1 { font-size: 1.3rem; margin-bottom: .3rem; }
  .login-box h1 span { color: var(--accent); }
  .login-box p.sub { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: .8rem; color: var(--muted); margin-bottom: .3rem; }
  .field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .6rem .8rem; border-radius: 6px; font-size: .9rem; }
  .field input:focus { outline: none; border-color: var(--accent); }
  button { width: 100%; background: var(--accent); color: #fff; border: none; padding: .7rem; border-radius: 6px; font-size: .9rem; cursor: pointer; margin-top: .5rem; }
  button:hover { opacity: .9; }
  .error-msg { background: rgba(239,68,68,.15); border: 1px solid var(--red); color: var(--red); padding: .5rem .8rem; border-radius: 6px; font-size: .8rem; margin-bottom: 1rem; display: none; }
  .info-msg { background: rgba(59,130,246,.15); border: 1px solid var(--accent); color: var(--accent); padding: .5rem .8rem; border-radius: 6px; font-size: .8rem; margin-bottom: 1rem; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="login-box">
  <h1>🔍 Log <span>Source</span> Checker</h1>

  <!-- Login form -->
  <div id="loginForm">
    <p class="sub">Inicia sesión para continuar</p>
    <div class="error-msg" id="loginError"></div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>
    <button onclick="doLogin()">Entrar</button>
  </div>

  <!-- Change password form (primer login) -->
  <div id="changeForm" class="hidden">
    <p class="sub">Primer acceso — cambia tu contraseña</p>
    <div class="info-msg">La contraseña por defecto debe cambiarse antes de continuar.</div>
    <div class="error-msg" id="changeError"></div>
    <div class="field">
      <label>Nueva contraseña (mín. 6 caracteres)</label>
      <input type="password" id="newPassword" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirmar contraseña</label>
      <input type="password" id="confirmPassword" autocomplete="new-password">
    </div>
    <button onclick="doChangePassword()">Cambiar y entrar</button>
  </div>
</div>

<script>
const API = '';
let tempToken = null;
let tempUser = null;

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (!document.getElementById('changeForm').classList.contains('hidden')) doChangePassword();
    else doLogin();
  }
});

async function doLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!user || !pass) { showErr(errEl, 'Rellena usuario y contraseña'); return; }

  try {
    const resp = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    const data = await resp.json();
    if (!resp.ok) { showErr(errEl, data.detail || 'Credenciales incorrectas'); return; }

    if (data.must_change) {
      tempToken = data.token;
      tempUser = user;
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('changeForm').classList.remove('hidden');
    } else {
      document.cookie = `lsc_token=${data.token}; path=/; SameSite=Strict; max-age=43200`;
      window.location.href = '/';
    }
  } catch (e) {
    showErr(errEl, 'Error de conexión');
  }
}

async function doChangePassword() {
  const newPass = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  const errEl = document.getElementById('changeError');
  errEl.style.display = 'none';

  if (newPass.length < 6) { showErr(errEl, 'Mínimo 6 caracteres'); return; }
  if (newPass !== confirm) { showErr(errEl, 'Las contraseñas no coinciden'); return; }
  if (newPass === 'admin') { showErr(errEl, 'Elige una contraseña diferente a la por defecto'); return; }

  try {
    const resp = await fetch(`${API}/api/auth/change-password`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${tempToken}`},
      body: JSON.stringify({new_password: newPass})
    });
    const data = await resp.json();
    if (!resp.ok) { showErr(errEl, data.detail || 'Error al cambiar contraseña'); return; }
    document.cookie = `lsc_token=${data.token}; path=/; SameSite=Strict; max-age=43200`;
    window.location.href = '/';
  } catch (e) {
    showErr(errEl, 'Error de conexión');
  }
}

function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
</script>
</body>
</html>
